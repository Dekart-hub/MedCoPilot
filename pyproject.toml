[project]
name = "medcopilot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.138.0",
    "httpx>=0.28.1",
    "langchain-openai>=1.3.3",
    "langgraph>=1.2.6",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.2",
    "pytest>=9.1.1",
    "uvicorn>=0.49.0",
]

# Опциональные: только для NliGroundingScorer (Tier 2 groundedness).
# Юнит-тесты работают и без них (модель подменяется фейком), нужны только для
# scripts/smoke_nli_scorer.py и реального прод-использования этого скорера.
[project.optional-dependencies]
nli = [
    "transformers>=4.46.0",
    "torch>=2.5.0",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
