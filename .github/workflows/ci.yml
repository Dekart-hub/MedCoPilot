name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medcopilot
          POSTGRES_PASSWORD: medcopilot
          POSTGRES_DB: medcopilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medcopilot -d medcopilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://medcopilot:medcopilot@localhost:5432/medcopilot
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy

      - name: Tests
        run: uv run pytest -q || [ $? -eq 5 ]
