# Compose skeleton for MedCoPilot.
#
# Only the application service lives here today. Later tasks extend this file
# additively: a `postgres` service (T4) and a `vllm` service (T7), wired to
# `app` via `depends_on` and the settings env vars.

services:
  app:
    build: .
    # Silence uvicorn's default access log: the app's request middleware emits a
    # single structured event per request, so uvicorn's line would only duplicate.
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --no-access-log
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
