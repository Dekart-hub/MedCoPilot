# Compose stack for MedCoPilot.
#
# `postgres` backs persistence (T4); `app` waits for it to become healthy and
# reads its connection string from DATABASE_URL. Later tasks extend this file
# additively (e.g. a `vllm` service in T7).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medcopilot
      POSTGRES_PASSWORD: medcopilot
      POSTGRES_DB: medcopilot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U medcopilot -d medcopilot
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  app:
    build: .
    # Silence uvicorn's default access log: the app's request middleware emits a
    # single structured event per request, so uvicorn's line would only duplicate.
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --no-access-log
    environment:
      DATABASE_URL: postgresql+asyncpg://medcopilot:medcopilot@postgres:5432/medcopilot
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  postgres-data:
